# Persistant Volume Clain (PVC), not to be used in statefulset
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: sqlite-pvc
#   namespace: todo-app
# spec:
#   accessModes:
#     - ReadWriteOnce # here, 'Once' means volume can only be attached with one node at a time. Replacable with Many
#   resources:
#     requests:
#       storage: 1Gi

# Headless service: required for StatefulSet stable DNS indentity
apiVersion: v1
kind: Service
metadata:
  name: todo-app-headless
  namespace: todo-app
spec:
  clusterIP: None
  selector:
    app: todo-app
  ports:
  - port: 8080
    targetPort: 8080

# Application deployment -> Changed to StatefulSet from deployment
---
apiVersion: apps/v1
kind: StatefulSet #Deployment
metadata:
  name: todo-app
  namespace: todo-app
spec:
  serviceName: "todo-app-headless" # the name of the headless service name
  replicas: 3 # can be scaled upto more using kubectl cli
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
        - name: todo-app
          image: hsfassih/todo-app
          imagePullPolicy: Always  # Change to Never if you used: k3d image import
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: secret_key
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: secret_key
            - name: algorithm
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: algorithm
            - name: access_token_expire_minutes
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: access_token_expire_minutes
            - name: database_url
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: database_url
            - name: redis_url
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: redis_url
          volumeMounts:
            - mountPath: /app/data
              name: sqlite-storage # name of volumeClaimTemplate
  volumeClaimTemplates:
    - metadata:
        name: sqlite-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi

# Application Cluster IP Service            
---
apiVersion: v1
kind: Service
metadata:
  name: todo-app-service
  namespace: todo-app
spec:
  selector:
    app: todo-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP

---
# Application NodePort Service
apiVersion: v1
kind: Service
metadata:
  name: todo-app-nodeport
  namespace: todo-app
spec:
  selector:
    app: todo-app
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080 # nodeport must be between 30000-32767

---
# Application LoadBalancer service
apiVersion: v1
kind: Service
metadata:
  name: todo-app-loadbalancer
  namespace: todo-app
spec:
  selector:
    app: todo-app
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080