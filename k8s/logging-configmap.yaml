apiVersion: v1
kind: ConfigMap
metadata:
  name: logging-agent-config
  namespace: todo-app
  labels:
    app: logging-agent
data:
  elasticsearch_host: "elasticsearch.logging.svc.cluster.local"
  elasticsearch_port: "9200"
  log_level: "info"
  fluent-bit.conf: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level ${LOG_LEVEL:-info}
        Parsers_File parsers.conf
        Parsers_File custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020

    # Input: Collect logs from container stdout/stderr
    [INPUT]
        Name tail
        Path /var/log/pods/*/*/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 25MB
        Skip_Long_Lines On
        Refresh_Interval 10

    # Input: Collect system logs
    [INPUT]
        Name tail
        Path /var/log/syslog
        Tag system.*
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On

    # Filter: Enrich logs with Kubernetes metadata
    [FILTER]
        Name kubernetes
        Match kube.*
        Kube_URL https://kubernetes.default.svc:443
        Kube_CA_File /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix kube.var.log.containers.
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude Off

    # Filter: Add node name
    [FILTER]
        Name modify
        Match *
        Add node_name ${NODE_NAME}
        Add cluster_name todo-app-cluster

    # Output: Send to Elasticsearch
    [OUTPUT]
        Name es
        Match *
        Host ${ELASTICSEARCH_HOST:-elasticsearch.logging.svc.cluster.local}
        Port ${ELASTICSEARCH_PORT:-9200}
        Retry_Limit 5
        Type _doc
        Index kubernetes-%Y.%m.%d

    # Output: Also log to stdout for debugging
    [OUTPUT]
        Name stdout
        Match *
        Format json_lines

  parsers.conf: |
    [PARSER]
        Name json
        Format json
        Time_Key timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep On

    [PARSER]
        Name docker
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ
        Time_Keep On

    [PARSER]
        Name cri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ%z

  custom_parsers.conf: |
    [PARSER]
        Name todo-app
        Format regex
        Regex ^\[(?<time>[^\]]+)\] (?<level>\w+) - (?<message>.*)$
        Time_Key time
        Time_Format %Y-%m-%d %H:%M:%S