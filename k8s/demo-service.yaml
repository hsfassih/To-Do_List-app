# A lightweight httpbin service used as the second Ingress backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-service
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-service
  template:
    metadata:
      labels:
        app: demo-service
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: demo-service
          image: kennethreitz/httpbin   # returns JSON info about the HTTP request
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: demo-service
  namespace: todo-app
spec:
  selector:
    app: demo-service
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP