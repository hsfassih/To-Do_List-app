name: Build & Push

on: [push, pull_request] # defining actions to trigger the workflow

permissions: # for the workflow to _ repository
  contents: write

jobs:
  pre-commit-checks:
    name: Checks by Pre-Commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: psf/black@c6755bb741b6481d6b3d3bb563c83fa060db96c9 # using commit hashes for security
      - name: Checkout code
        uses: actions/checkout@v6

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      # Install pre-commit
      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      # Run pre-commit on all files
      - name: Run pre-commit hooks on all files
        run: |
          echo "Running pre-commit hooks to ensure consistency between local and CI..."
          pre-commit run --all-files --show-diff-on-failure
  build:
    runs-on: ubuntu-latest
    
    services:  # Added Redis service for the job
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/todo-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/todo-app:buildcache,mode=max