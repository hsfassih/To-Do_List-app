# ─── Primary values (used in test cases) ────────────────────────────────────
replicaCount: 3

image:
  repository: hsfassih/todo-app
  tag: "latest"        # override with --set image.tag=v1.2 on upgrade
  pullPolicy: Always

# ─── Namespace ───────────────────────────────────────────────────────────────
namespace: todo-app

# ─── App Service ─────────────────────────────────────────────────────────────
service:
  port: 80
  targetPort: 8080

# ─── Ingress ─────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: traefik
  appHost: api.todo.local
  demoHost: demo.todo.local

# ─── Resource limits (todo-app container) ────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ─── Storage (StatefulSet volumeClaimTemplate) ───────────────────────────────
storage:
  size: 1Gi
  storageClassName: local-path   # matches your k3d/Rancher default

# ─── Redis ───────────────────────────────────────────────────────────────────
redis:
  image: redis:alpine
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# ─── Demo/httpbin sidecar service ────────────────────────────────────────────
demoService:
  image: kennethreitz/httpbin

# ─── ConfigMap data ──────────────────────────────────────────────────────────
config:
  appName: "todo-list-app"
  appEnv: "production"
  logLevel: "info"
  accessTokenExpireMinutes: "30"

# ─── Secret data ─────────────────────────────────────────────────────────────
# WARNING: for production, pass these via --set or an external secret manager.
# They are here only to mirror your existing k8s/secret.yaml for local dev.
secret:
  secretKey: "09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7"
  algorithm: "HS256"
  accessTokenExpireMinutes: "30"
  redisUrl: "redis://redis-service:6379"
  databaseUrl: "sqlite+aiosqlite:////app/data/todo_list.db"
  dbPassword: "your-strong-db-password-here"