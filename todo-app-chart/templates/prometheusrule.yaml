{{- $monitoring := (get .Values "monitoring" | default dict) -}}
{{- $prometheusRule := (get $monitoring "prometheusRule" | default dict) -}}
{{- $prometheusRuleEnabled := (get $prometheusRule "enabled" | default true) -}}
{{- $prometheusRuleReleaseLabel := (get $prometheusRule "releaseLabel" | default "kube-prometheus-stack") -}}
{{- if and $prometheusRuleEnabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PrometheusRule") }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: todo-app-alerts
  namespace: {{ .Values.namespace }}
  labels:
    release: {{ $prometheusRuleReleaseLabel | quote }}
spec:
  groups:
    - name: todo-app.pod-restarts
      rules:
        - alert: PodRestartingTooOften
          expr: |
            increase(kube_pod_container_status_restarts_total{
              namespace="{{ .Values.namespace }}"
            }[10m]) > 3
          for: 1m
          labels:
            severity: warning
            namespace: "{{ "{{" }} $labels.namespace {{ "}}" }}"
            pod: "{{ "{{" }} $labels.pod {{ "}}" }}"
          annotations:
            summary: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} is restarting too often
            description: >-
              Pod {{ "{{" }} $labels.pod {{ "}}" }} in namespace
              {{ "{{" }} $labels.namespace {{ "}}" }} has restarted
              {{ "{{" }} $value | printf "%.0f" {{ "}}" }} times in the last 10 minutes.
{{- end }}